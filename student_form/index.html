<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Enrollment Form | JPDB</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-wrap d-flex align-items-center justify-content-center">
      <div class="container py-4">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8 col-xl-7">
            <div class="card shadow-lg border-0 form-card">
              <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                  <h1 class="h3 fw-bold mb-1">Student Enrollment Form</h1>
                  <p class="text-muted mb-0">SCHOOL-DB / STUDENT-TABLE</p>
                </div>

                <div id="alertContainer" aria-live="polite"></div>

                <form id="studentForm" class="needs-validation" novalidate>
                  <div class="row g-3">
                    <div class="col-12">
                      <label for="rollNo" class="form-label">Roll-No</label>
                      <input
                        type="text"
                        class="form-control"
                        id="rollNo"
                        name="Roll-No"
                        required
                        autocomplete="off"
                      />
                      <div class="invalid-feedback">Roll-No is required.</div>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="fullName" class="form-label">Full Name</label>
                      <input
                        type="text"
                        class="form-control"
                        id="fullName"
                        name="Full-Name"
                        required
                        autocomplete="off"
                      />
                      <div class="invalid-feedback">Full Name is required.</div>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="studentClass" class="form-label">Class</label>
                      <input
                        type="text"
                        class="form-control"
                        id="studentClass"
                        name="Class"
                        required
                        autocomplete="off"
                      />
                      <div class="invalid-feedback">Class is required.</div>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="birthDate" class="form-label">Birth Date</label>
                      <input
                        type="date"
                        class="form-control"
                        id="birthDate"
                        name="Birth-Date"
                        required
                      />
                      <div class="invalid-feedback">Birth Date is required.</div>
                    </div>

                    <div class="col-12 col-md-6">
                      <label for="enrollmentDate" class="form-label">Enrollment Date</label>
                      <input
                        type="date"
                        class="form-control"
                        id="enrollmentDate"
                        name="Enrollment-Date"
                        required
                      />
                      <div class="invalid-feedback">Enrollment Date is required.</div>
                    </div>

                    <div class="col-12">
                      <label for="address" class="form-label">Address</label>
                      <textarea
                        class="form-control"
                        id="address"
                        name="Address"
                        rows="3"
                        required
                      ></textarea>
                      <div class="invalid-feedback">Address is required.</div>
                    </div>
                  </div>

                  <div class="d-flex flex-wrap gap-2 mt-4">
                    <button type="button" id="saveBtn" class="btn btn-success px-4">Save</button>
                    <button type="button" id="updateBtn" class="btn btn-primary px-4">Update</button>
                    <button type="button" id="resetBtn" class="btn btn-outline-secondary px-4">Reset</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
